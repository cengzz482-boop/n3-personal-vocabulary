  --bg: #1265b1;
  --panel: #fff0b8;
  --panel-2: #ffe07b;
  --line: #6a421c;
  --text: #24150e;
  --muted: #735437;
  --green: #32bb43;
  --green-dark: #b9e54b;
  --red: #e34636;

}

html[data-theme="night"] {
  color-scheme: dark;
  --bg: #171c24;
  --panel: #262d36;
  --panel-2: #303844;
  --line: #596674;
  --text: #d8dde3;
  --muted: #929ca7;
  --green: #82a98b;
  --green-dark: #35483d;
  --red: #be766d;
  --yellow: #b6a66f;
  --main-bg: rgba(25,30,38,.94);
  --toolbar-bg: rgba(43,51,61,.82);
  --input-bg: #1e252e;
  --meaning: #c1c7cd;
  --card-shadow: #181d24;
  --pitch: #9da7b2;
}

* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--text); font-family: "Courier New", "PingFang SC", monospace; background-image: var(--smw-asset-cloud-1); background-size: 96px 72px; background-repeat: space; background-attachment: fixed; image-rendering: pixelated; }
html[data-theme="night"] body { background-image: linear-gradient(rgba(18,23,30,.78), rgba(18,23,30,.78)), var(--smw-asset-cloud-1); }
html[data-theme="night"] .level-scenery { filter: brightness(.42) saturate(.38) hue-rotate(12deg); opacity: .72; }
button, input { font: inherit; }
button { cursor: pointer; touch-action: manipulation; }
.app-notice { position: fixed; z-index: 60; left: 50%; bottom: 24px; max-width: min(420px, calc(100vw - 28px)); padding: 10px 14px; border: 3px solid var(--line); border-radius: 5px; background: var(--panel); color: var(--text); box-shadow: inset 0 -4px var(--card-shadow), 4px 4px rgba(30,20,12,.3); font-size: 12px; text-align: center; opacity: 0; pointer-events: none; transform: translate(-50%, 18px); transition: bottom .2s ease, opacity .18s ease, transform .18s ease; }
.app-notice.show { opacity: 1; transform: translate(-50%, 0); }
body.sentence-caption-visible .app-notice { bottom: calc(max(12px, env(safe-area-inset-bottom)) + 76px); }
.level-scenery { position: fixed; z-index: 0; inset: 0; overflow: hidden; pointer-events: none; image-rendering: pixelated; }
.scenery-bush { position: absolute; bottom: 28px; width: 224px; opacity: .9; }
.scenery-bush-left { left: 220px; }
.scenery-bush-right { right: 0; scale: -1 1; }
.scenery-tree { position: absolute; left: 4px; bottom: 0; width: 210px; opacity: .55; }
.scenery-goal { position: absolute; right: 18px; bottom: 25px; height: 150px; }
.scenery-bricks { position: absolute; right: 16px; top: 92px; display: flex; gap: 2px; }
.scenery-bricks i { width: 28px; height: 28px; border: 3px solid #6a421c; background: #ffe04d var(--smw-asset-icon-block) center/18px no-repeat; box-shadow: inset 0 -5px #d99e2b; }
.scenery-bricks i:nth-child(2), .scenery-bricks i:nth-child(4) { transform: translateY(18px); }

.sidebar { position: fixed; inset: 0 auto 0 0; width: 235px; padding: 28px 18px; background: #3f9f42; border-right: 4px solid #74451f; box-shadow: inset -7px 0 #94dc4b; display: flex; flex-direction: column; }
.brand { display: flex; align-items: center; gap: 12px; margin: 0 8px 34px; }
.brand-mark { width: 42px; height: 42px; display: grid; place-items: center; border: 3px solid #fff; border-radius: 50%; background: #e34134; color: #fff; font-size: 20px; font-weight: 900; box-shadow: 3px 3px #5d2e18; }
.brand strong, .brand small { display: block; }
.brand small { color: var(--muted); margin-top: 4px; font-size: 11px; }
nav { display: grid; gap: 7px; }
.nav-item { border: 2px solid transparent; background: transparent; color: #173816; border-radius: 4px; padding: 12px 14px; text-align: left; font-weight: 700; }
.nav-item:hover, .nav-item.active { color: var(--text); background: #ffe574; border-color: #6a421c; box-shadow: inset 0 -4px #e0a62e; }
.nav-item.active { border-left-width: 6px; }
.sidebar-foot { margin-top: auto; padding: 12px 8px; color: #5e716c; font-size: 11px; line-height: 1.6; }

main { position: relative; z-index: 1; margin-left: 235px; min-height: 100vh; padding: 32px 42px 96px; background: var(--main-bg); border-left: 4px solid #fff3a3; }
html[data-theme="night"] main { border-left-color: #46525e; }
html[data-theme="night"] .sidebar { background: #202730; border-color: #52606c; box-shadow: inset -7px 0 #2d3741; }
html[data-theme="night"] .nav-item { color: #aeb7c0; }
html[data-theme="night"] .nav-item:hover, html[data-theme="night"] .nav-item.active { background: #35414b; color: #dde2e7; border-color: #65727e; box-shadow: inset 0 -4px #1c222a; }
html[data-theme="night"] .easter-level { background: #202833; box-shadow: inset 0 7px #465563; }
html[data-theme="night"] .easter-level::before { content: ""; position: absolute; z-index: 14; inset: 0; background: rgba(16,22,30,.42); pointer-events: none; }
main::after { content: ""; position: absolute; z-index: -1; left: 0; right: 0; bottom: 0; height: 48px; background: var(--smw-asset-level-ground) left bottom/260px 42px repeat-x; image-rendering: pixelated; }
.easter-level { position: relative; height: 430px; margin: 110px -42px -96px; overflow: hidden; contain: layout paint style; content-visibility: auto; contain-intrinsic-size: auto 430px; border-top: 8px solid #32bb43; background: #63b8e8; image-rendering: pixelated; box-shadow: inset 0 7px #fff7ba; }
.easter-level.course-impact { animation: course-screen-shake .3s steps(4); }
.easter-level.course-cave-active { box-shadow: inset 0 7px #7b8ca3, inset 0 0 90px 25px rgba(13,20,32,.72); }
.easter-level.course-sprint-active { box-shadow: inset 0 7px #fff0a0, inset 0 0 45px 10px rgba(255,197,89,.18); }
.easter-level::after { content: ""; position: absolute; z-index: 15; left: 0; right: 0; bottom: 0; height: 10px; background: #222f44; opacity: .25; pointer-events: none; }
.easter-hud { position: absolute; z-index: 30; inset: 15px 22px auto; display: flex; justify-content: space-between; color: #fff; font-size: 15px; font-weight: 900; text-shadow: 3px 3px #3f2c24; pointer-events: none; }
.easter-hud i { font-style: normal; }
.course-parallax { position: absolute; z-index: 2; inset: 0; overflow: hidden; pointer-events: none; }
.course-parallax img { position: absolute; image-rendering: pixelated; }
.course-parallax-far { opacity: .46; }
.course-parallax-far img { width: 95px; top: 75px; }
.course-parallax-far img:nth-child(1) { left: 8%; }.course-parallax-far img:nth-child(2) { left: 32%; top: 120px; }.course-parallax-far img:nth-child(3) { left: 58%; top: 62px; }.course-parallax-far img:nth-child(4) { left: 84%; top: 138px; }.course-parallax-far img:nth-child(5) { left: 110%; }.course-parallax-far img:nth-child(6) { left: 138%; top: 105px; }
.course-parallax-mid { z-index: 2; opacity: .28; }
.course-parallax-mid img { bottom: 62px; width: 175px; filter: saturate(.65) brightness(1.12); }
.course-parallax-mid img:nth-child(1) { left: 4%; }.course-parallax-mid img:nth-child(2) { left: 25%; width: 210px; }.course-parallax-mid img:nth-child(3) { left: 52%; }.course-parallax-mid img:nth-child(4) { left: 76%; width: 220px; }.course-parallax-mid img:nth-child(5) { left: 105%; }.course-parallax-mid img:nth-child(6) { left: 133%; width: 205px; }
.course-parallax-front { z-index: 18; opacity: .78; }
.course-parallax-front img { bottom: -20px; width: 215px; filter: brightness(.72) saturate(1.1); }
.course-parallax-front img:nth-child(1) { left: 105%; }.course-parallax-front img:nth-child(2) { left: 145%; }.course-parallax-front img:nth-child(3) { left: 195%; }.course-parallax-front img:nth-child(4) { left: 245%; }
.easter-level.playing .course-parallax-far { animation: course-parallax-far 64s linear both; will-change: transform; }
.easter-level.playing .course-parallax-mid { animation: course-parallax-mid 64s linear both; will-change: transform; }
.easter-level.playing .course-parallax-front { animation: course-parallax-front 64s linear both; will-change: transform; }
.easter-track { position: absolute; z-index: 1; left: 0; top: 0; width: 7800px; height: 100%; transform: translate3d(0,0,0); background: #63b8e8; }
.easter-level.playing .easter-track { animation: easter-camera-scroll 64s linear both; will-change: transform; }
.course-zone { position: absolute; z-index: 0; left: var(--x); bottom: 0; width: var(--w); height: 100%; pointer-events: none; }
.course-zone-plains { background: linear-gradient(#63b8e8 0 72%, #91d0e8 72%); }
.course-zone-sky { background: linear-gradient(#55afe3 0 72%, #a9dced 72%); }
.course-zone-cave { background: linear-gradient(#37465d 0 72%, #263449 72%); box-shadow: inset 0 55px #202b3b; }
.course-zone-sunset { background: linear-gradient(#e39b71 0 45%, #f4c982 72%, #9fd0df 72%); }
.course-ground { position: absolute; z-index: 8; left: var(--x); bottom: 0; width: var(--w); height: 70px; background: var(--smw-asset-level-ground) left bottom/300px 62px repeat-x; }
.course-ground::after { content: ""; position: absolute; left: 0; right: 0; top: 0; height: 8px; border-top: 4px solid #fff078; background: #33b83e; }
.course-ground-cave { filter: brightness(.48) saturate(.55); }
.course-prop { position: absolute; left: var(--x); bottom: var(--y); width: var(--w); object-fit: contain; image-rendering: pixelated; pointer-events: none; }
.course-cloud { z-index: 2; opacity: .68; }
.course-tree, .course-bush { z-index: 3; opacity: .88; }
